name: cloud-pipeline
run-name: hotvideo-${{ inputs.queue_file || github.sha }}

on:
  push:
    branches: [main]
    paths:
      - 'queue/*.json'
  workflow_dispatch:
    inputs:
      queue_file:
        description: '要重跑的 queue JSON 路径'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: hotvideo-cloud-pipeline
  cancel-in-progress: false
  queue: max

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.queue_files.outputs.files }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select queue manifests
        id: queue_files
        shell: bash
        env:
          MANUAL_QUEUE_FILE: ${{ inputs.queue_file }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            files=("$MANUAL_QUEUE_FILE")
          elif [[ "$PUSH_BEFORE_SHA" =~ ^0+$ ]]; then
            mapfile -t files < <(git diff-tree --root --no-commit-id --name-only -r "$GITHUB_SHA" -- 'queue/*.json')
          else
            mapfile -t files < <(git diff --name-only "$PUSH_BEFORE_SHA" "$GITHUB_SHA" -- 'queue/*.json')
          fi

          if [[ ${#files[@]} -eq 0 ]]; then
            echo 'No queue manifest in this commit (runtime-only change); skipping process.'
            echo 'files=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for file in "${files[@]}"; do
            [[ "$file" == queue/*.json ]]
            [[ "$file" != queue/*/*.json ]]
            test -f "$file"
          done

          json="$(printf '%s\n' "${files[@]}" | jq -Rsc 'split("\n") | map(select(length > 0))')"
          echo "files=$json" >> "$GITHUB_OUTPUT"

  process:
    name: process-${{ matrix.queue_file }}
    needs: prepare
    if: needs.prepare.outputs.files != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        queue_file: ${{ fromJSON(needs.prepare.outputs.files) }}
    env:
      ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
      LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
      LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
      HOTVIDEO_FEISHU_BASE_TOKEN: ${{ secrets.HOTVIDEO_FEISHU_BASE_TOKEN }}
      HOTVIDEO_FEISHU_TABLE_ID: ${{ secrets.HOTVIDEO_FEISHU_TABLE_ID }}
      HOTVIDEO_FEISHU_ATTACHMENT_FIELD: fldgReMdHu
      HOTVIDEO_ANALYZE_LANE: fast
      HOTVIDEO_ANALYZE_CONCURRENCY: '5'
      HOTVIDEO_PIPELINE_ATTEMPTS: '1'
      HOTVIDEO_DOUBAO_HTTP_TRANSPORT: fetch
      HOTVIDEO_DOUBAO_FORCE_FILE_INPUT_ON_CLOUD: '1'
      HOTVIDEO_DOUBAO_FILE_UPLOAD_TRANSPORT: https
      HOTVIDEO_RUN_RESULT_PATH: out/run-result.json

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify local runtime hashes
        run: node scripts/verify-runtime-sync.mjs

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ffmpeg
          python -m pip install --disable-pip-version-check -e ./video-infra
          npm install --global @larksuite/cli@1.0.53
          ffmpeg -version | head -n 1

      - name: Configure Feishu bot
        shell: bash
        run: |
          test -n "$LARK_APP_ID"
          test -n "$LARK_APP_SECRET"
          printf '%s' "$LARK_APP_SECRET" | lark-cli config init \
            --app-id "$LARK_APP_ID" \
            --app-secret-stdin \
            --brand feishu
          lark-cli base +record-list \
            --base-token "$HOTVIDEO_FEISHU_BASE_TOKEN" \
            --table-id "$HOTVIDEO_FEISHU_TABLE_ID" \
            --as bot \
            --format json \
            --field-id 视频链接 \
            --limit 1 \
            --jq '{ok: .ok}'

      - name: Process queue manifest
        shell: bash
        run: node scripts/run-queue.mjs "${{ matrix.queue_file }}"

      - name: Derive queue artifact identity
        id: artifact_identity
        if: always()
        shell: bash
        env:
          QUEUE_FILE: ${{ matrix.queue_file }}
        run: |
          queue_path_key="$(printf '%s' "$QUEUE_FILE" | sha256sum | cut -c1-16)"
          echo "queue_path_key=$queue_path_key" >> "$GITHUB_OUTPUT"

      - name: Upload terminal run-result envelope
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-result-${{ github.run_id }}-${{ github.run_attempt }}-${{ steps.artifact_identity.outputs.queue_path_key }}
          path: out/run-result.json
          if-no-files-found: error
          retention-days: 90
